<html>
    <head>
        <title>Salary Sheet</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h2>Employee Salary Form</h2>

        <form action="Salary" method="post">

            Employee ID:
            <input type="number" name="eid" required>
            <br><br>

            Employee Name:
            <input type="text" name="ename" required>
            <br><br>

            Employee Salary:
            <input type="number" name="basic" required>
            <br><br>
            <input type="submit" value="Generate Salary">

        </form>
    </body>
